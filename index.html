<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinTC Mini App</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="app">

    <header class="header">

        <div class="profile">

            <div class="avatar">
                👤
            </div>

            <div>

                <h3 id="username">
                    Loading...
                </h3>

                <span>
                    Level 1
                </span>

            </div>

        </div>

        <div class="balanceBox">

            <span>Balance</span>

            <h2 id="balance">
                0
            </h2>

        </div>

    </header>


    <section class="coinSection">

        <img
            src="assets/logo.png"
            id="coin"
            class="coin"
            alt="CoinTC">

    </section>


    <section class="energyBox">

        <div class="energyText">

            <span>
                Energy
            </span>

            <span id="energyValue">
                100 / 100
            </span>

        </div>

        <div class="progress">

            <div
                class="progressBar"
                id="energyBar">
            </div>

        </div>

    </section>


    <section class="menuGrid">

        <div class="card">
            🎁
            <span>Daily Reward</span>
        </div>

        <div class="card">
            📋
            <span>Tasks</span>
        </div>

        <div class="card">
            👥
            <span>Referral</span>
        </div>

        <div class="card">
            🏆
            <span>Leaderboard</span>
        </div>

        <div class="card">
            💼
            <span>Wallet</span>
        </div>

        <div class="card">
            ⚙️
            <span>Settings</span>
        </div>

    </section>


    <footer class="bottomNav">

        <button class="nav active">
            🏠
            <span>Home</span>
        </button>

        <button class="nav">
            📋
            <span>Tasks</span>
        </button>

        <button class="nav">
            👥
            <span>Friends</span>
        </button>

        <button class="nav">
            🏆
            <span>Rank</span>
        </button>

        <button class="nav">
            💼
            <span>Wallet</span>
        </button>

    </footer>

</div>

<script src="app.js"></script>

</body>
</html>
