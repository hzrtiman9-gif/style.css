<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>CoinTC</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="background"></div>

<header>

<div class="player">

<div class="avatar">

<img
src="assets/avatar.png"
alt="avatar">

</div>

<div class="player-info">

<h2 id="username">

Loading...

</h2>

<p>CoinTC Miner</p>

</div>

</div>

<div class="wallet">

<div id="score">

0

</div>

<span>Coins</span>

</div>

</header>

<section class="energy">

<div class="energy-top">

<span>⚡ Energy</span>

<span id="energy">

1000 / 1000

</span>

</div>

<div class="bar">

<div id="energyFill"></div>

</div>

</section>

<main>

<div class="coin-area">

<img

id="coin"

src="coin.png"

src="coin.png"
  
alt="CoinTC"

draggable="false">

</div>

</main>

<nav>

<button id="homeBtn">

🏠

<span>Home</span>

</button>

<button id="boostBtn">

🚀

<span>Boost</span>

</button>

<button id="earnBtn">

💰

<span>Earn</span>

</button>

<button id="friendsBtn">

👥

<span>Friends</span>

</button>

<button id="taskBtn">

📋

<span>Tasks</span>

</button>

</nav>

<script src="app.js"></script>

</body>

</html>
